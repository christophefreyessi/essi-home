<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      line-height: 1;
      color: #1a1a1a;
    }
    

    /* ── Header ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5em;
    }

    .logo-row {
      display: flex;
      flex-wrap: wrap;          /* logos wrap to next line if needed */
      align-items: center;
      gap: 8px;
    }

    .logo-row img {
      height: 60px;             /* slightly smaller base size */
      max-width: 100%;
      object-fit: contain;
    }

    header h2 {
      font-size: clamp(0.95rem, 2.5vw, 1.3rem);  /* fluid font size */
      line-height: 1.4;
      margin: 0.3em 0 0;
    }
	header h3 {
			margin-bottom: 0.2em;  /* tighten below the heading */
	}
    /* ── Agenda image ── */
    .agenda-img {
      display: block;
      max-width: 100%;          /* never overflows the viewport */
      height: auto;
      margin-top: 0.2em;
    }

    /* ── Table (if used) ── */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;         /* horizontal scroll instead of overflow */
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1em;
      min-width: 400px;         /* prevents table from collapsing too much */
    }

    table, th, td {
      border: 1px solid #aaa;
    }

    th, td {
      padding: 0.6em;
      text-align: left;
    }

    th {
      background-color: #f0f0f0;
    }

    .highlight {
      color: #0055aa;
      font-weight: bold;
    }

    /* ── Mobile breakpoint ── */
	@media (orientation: landscape) and (max-height: 600px) {
		.logo-row {
			flex-wrap: nowrap;
		}

		.logo-row img {
			height: auto;
			width: clamp(30px, 30vw, 70px);  /* narrower in landscape */
		}

		.logo-mscc {
			width: clamp(24px, 24vw, 56px);  
		}
	}
    @media (max-width: 600px) {
		.logo-row img {
			height: auto;
			flex-wrap: nowrap;
			width: clamp(36px, 30vw, 64px);  /* fluid: scales with screen width */
		}
		.logo-mscc {
			width: clamp(30px, 24vw, 50px);
		}
		header h2 {
			font-size: 0.85rem;
			line-height: 1.3;
		}
		header h3 {
			font-size: 0.6rem;
			line-height: 1;
		}
      body {
        margin: 6px;
      }
    }
  </style>
</head>
<body>

<header>
	<a href="fsnp2026.html" class="logo-row">
		<img src="images/FNSPeventLogoSmall.png"        alt="FSNP Logo">
		<img src="images/chipstartEuLogo.jpg"            alt="ChipStart EU Logo">
		<img src="images/EuroCDPLogo.jpg"                alt="EuroCDP Logo">
		<img src="images/mscc-logo_full-colour.png"      alt="MSCC Logo">
		<img src="images/EN_Co-fundedbytheEU_RGB_POS.png" alt="EU Co-funded Logo">
	</a>
	<h3>Forming Storming Norming Performing of European Semiconductor Startups
		<br>
		<u>Agenda June 4<sup>th</sup> 2026</u>
	</h3>
</header>

<img
  class="agenda-img"
  src="images/fsnp2026agenda.png"
  alt="FSNP 2026 Agenda"
>

</body>
</html>
